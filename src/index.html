<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; connect-src https://api.mymemory.translated.net https://api.dictionaryapi.dev;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumi Translate</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="noise"></div>
  </div>

  <main class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">译</div>
        <div>
          <div class="brand-title">Lumi</div>
          <div class="brand-sub">Translate</div>
        </div>
      </div>

      <button class="nav-item active" data-page="translate">
        <span>✦</span>
        <span>翻译</span>
      </button>
      <button class="nav-item" data-page="history">
        <span>◌</span>
        <span>历史</span>
      </button>
      <button class="nav-item" data-page="settings">
        <span>⚙</span>
        <span>设置</span>
      </button>

      <div class="sidebar-spacer"></div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <h1>Lumi Translate</h1>
          <p>轻盈、安静、响应极快的桌面翻译工作台</p>
        </div>
        <div class="window-actions">
          <button id="minimizeBtn" title="最小化">—</button>
          <button id="hideBtn" title="隐藏到托盘">⌄</button>
          <button id="closeBtn" title="关闭到托盘">×</button>
        </div>
      </header>

      <section class="page page-translate active" id="pageTranslate">
        <div class="toolbar glass">
          <label>
            <span>源语言</span>
            <select id="sourceLang"></select>
          </label>
          <button class="swap" id="swapBtn" title="交换语言">⇄</button>
          <label>
            <span>目标语言</span>
            <select id="targetLang"></select>
          </label>
          <button class="pill" id="clipboardBtn">剪贴板翻译</button>
          <button class="pill ghost" id="detailBtn">单词详解</button>
        </div>

        <div class="translate-grid">
          <section class="panel input-panel">
            <div class="panel-head">
              <span>输入</span>
              <small id="inputCount">0 chars</small>
            </div>
            <textarea id="inputText" spellcheck="false" placeholder="输入或粘贴文本，Lumi 会在你停顿时自动翻译…"></textarea>
          </section>

          <section class="panel result-panel">
            <div class="panel-head">
              <span>结果</span>
              <small id="statusText">Ready</small>
            </div>
            <textarea id="resultText" readonly placeholder="翻译结果会显示在这里"></textarea>
            <div class="panel-actions">
              <button class="pill primary" id="translateBtn">立即翻译</button>
              <button class="pill" id="copyBtn">复制结果</button>
              <button class="pill ghost" id="clearBtn">清空</button>
            </div>
          </section>
        </div>

        <section class="detail-dock panel" id="detailDock">
          <div class="detail-title">
            <div>
              <strong id="wordTitle">Word Detail</strong>
              <span id="phoneticText"></span>
            </div>
            <small>dictionary card</small>
          </div>
          <div id="dictionaryContent" class="dictionary-empty">输入英文单词后显示释义、词性和例句。</div>
        </section>
      </section>

      <section class="page" id="pageHistory">
        <div class="panel full">
          <div class="panel-head">
            <span>历史记录</span>
            <button class="pill ghost" id="clearHistoryBtn">清空历史</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </section>

      <section class="page" id="pageSettings">
        <div class="settings-grid">
          <section class="panel">
            <div class="panel-head"><span>外观</span></div>
            <label class="setting-row">
              <span>窗口置顶</span>
              <input type="checkbox" id="alwaysOnTop" />
            </label>
            <label class="setting-row">
              <span>透明度</span>
              <input type="range" id="opacityRange" min="0.78" max="1" step="0.01" />
            </label>
          </section>

          <section class="panel">
            <div class="panel-head"><span>快捷键</span></div>
            <label class="setting-row column">
              <span>显示 / 隐藏</span>
              <input id="toggleShortcut" class="input-line shortcut-input" placeholder="Ctrl+Alt+T" />
            </label>
            <label class="setting-row column">
              <span>翻译剪贴板</span>
              <input id="clipboardShortcut" class="input-line shortcut-input" placeholder="Ctrl+Alt+C" />
            </label>
            <label class="setting-row column">
              <span>切换详解</span>
              <input id="detailShortcut" class="input-line shortcut-input" placeholder="Ctrl+Shift+D" />
            </label>
          </section>

          <section class="panel wide">
            <div class="panel-head"><span>翻译服务</span></div>
            <label class="setting-row column">
              <span>自定义接口 URL（可留空，支持 {text} {source} {target}）</span>
              <input id="customApiUrl" class="input-line" placeholder="默认使用 MyMemory 免费接口" />
            </label>
            <label class="setting-row column">
              <span>请求超时 ms</span>
              <input id="timeoutMs" class="input-line" type="number" min="1000" max="60000" />
            </label>
            <button class="pill primary" id="saveSettingsBtn">保存设置</button>
          </section>
        </div>
      </section>
    </section>
  </main>

  <script src="./renderer.js"></script>
</body>
</html>
