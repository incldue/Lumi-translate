<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumi Screen Selection</title>
  <link rel="stylesheet" href="./screen-overlays.css" />
</head>
<body class="selection-body">
  <div class="selection-shade"></div>
  <div class="selection-tip" id="selectionTip">
    <strong>拖拽选择屏幕区域</strong>

    <small>松开鼠标开始识别，按 Esc 取消</small>
  </div>
  <div class="selection-box" id="selectionBox">
    <span id="selectionSize"></span>
  </div>
  <script src="./selection.js"></script>
</body>
</html>
